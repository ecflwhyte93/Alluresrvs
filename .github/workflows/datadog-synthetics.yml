// ==============================
// FULL SYNTHETIC LOGGING SYSTEM
// Single-file deployment ready
// ==============================

const express = require("express");
const mongoose = require("mongoose");
const cors = require("cors");

// ==============================
// CONFIG
// ==============================

// 👉 Replace with your MongoDB Atlas URI for real deployment
const MONGO_URI = process.env.MONGO_URI || "mongodb://127.0.0.1:27017/syntheticLogs";

const PORT = process.env.PORT || 3000;

// ==============================
// INIT
// ==============================

const app = express();
app.use(cors());

// ==============================
// DATABASE
// ==============================

mongoose.connect(MONGO_URI, {
  useNewUrlParser: true,
  useUnifiedTopology: true,
});

const logSchema = new mongoose.Schema({
  userId: String,
  sessionId: String,
  action: String,
  device: String,
  location: String,
  timestamp: Date,
});

const Log = mongoose.model("Log", logSchema);

// ==============================
// SYNTHETIC ENGINE
// ==============================

const locations = ["Calgary", "Toronto", "Vancouver"];
const actions = ["VIEW_AD", "CLICK_AD", "LOGIN", "POST_AD"];

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

async function simulateSession() {
  const userId = "user_" + Math.floor(Math.random() * 100000);
  const sessionId = "session_" + Date.now();

  const steps = Math.floor(Math.random() * 5) + 3;

  for (let i = 0; i < steps; i++) {
    const log = new Log({
      userId,
      sessionId,
      action: random(actions),
      device: random(["mobile", "desktop"]),
      location: random(locations),
      timestamp: new Date(),
    });

    await log.save();

    // simulate human delay
    await new Promise(r => setTimeout(r, Math.random() * 1500));
  }
}

// ==============================
// AUTO RUNNER
// ==============================

function startRunner() {
  setInterval(() => {
    simulateSession();
    console.log("🔥 Synthetic session generated");
  }, 4000);
}

// ==============================
// API ROUTES
// ==============================

// Health check
app.get("/", (req, res) => {
  res.send("✅ Synthetic Logging Server Running");
});

// Get logs
app.get("/logs", async (req, res) => {
  const logs = await Log.find().sort({ timestamp: -1 }).limit(100);
  res.json(logs);
});

// Manual trigger
app.get("/generate", async (req, res) => {
  await simulateSession();
  res.send("✅ Session generated");
});

// ==============================
// BUILT-IN DASHBOARD
// ==============================

app.get("/dashboard", (req, res) => {
  res.send(`
    <html>
    <head>
      <title>Live Logs</title>
      <style>
        body { font-family: Arial; background:#111; color:#0f0; padding:20px;}
        h2 { color:#0f0; }
        li { margin-bottom:8px; }
        button { padding:10px; margin-bottom:10px; }
      </style>
    </head>
    <body>
      <h2>🔥 Live Synthetic Logs</h2>
      <button onclick="loadLogs()">Refresh</button>
      <ul id="logs"></ul>

      <script>
        async function loadLogs() {
          const res = await fetch('/logs');
          const data = await res.json();

          const list = document.getElementById('logs');
          list.innerHTML = "";

          data.forEach(log => {
            const li = document.createElement('li');
            li.textContent = 
              log.userId + " | " + 
              log.action + " | " + 
              log.location + " | " + 
              new Date(log.timestamp).toLocaleTimeString();
            list.appendChild(li);
          });
        }

        setInterval(loadLogs, 3000);
        loadLogs();
      </script>
    </body>
    </html>
  `);
});

// ==============================
// START SERVER
// ==============================

app.listen(PORT, () => {
  console.log("🚀 Server running on port " + PORT);
  startRunner();
});{
